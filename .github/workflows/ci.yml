name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Ruff
        run: poetry run ruff check agentforge tests

      - name: Mypy
        run: poetry run mypy agentforge

      - name: Pytest (unit + integration)
        run: poetry run pytest -m "unit or integration"
